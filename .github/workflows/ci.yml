name: CI

on:
  push:
    branches: [master]
    paths:
      - "**.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".python-version"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "**.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".python-version"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run tests
        run: uv run pytest
